name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Docker images to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devops-platform-backend:latest
            ghcr.io/${{ github.repository_owner }}/devops-platform-backend:${{ github.sha }}

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devops-platform-frontend:latest
            ghcr.io/${{ github.repository_owner }}/devops-platform-frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=/api
