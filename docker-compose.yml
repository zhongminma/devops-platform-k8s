services:
  backend:
    build:
      context: ./apps/backend
    environment:
      NODE_ENV: production
      PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend
