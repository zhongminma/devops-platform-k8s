apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: devops-platform
  labels:
    app: mongodb
spec:
  serviceName: mongodb-headless
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      initContainers:
        - name: copy-keyfile
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp /keyfile-src/keyfile /keyfile/keyfile && chmod 400 /keyfile/keyfile && chown 999:999 /keyfile/keyfile
          volumeMounts:
            - name: mongodb-keyfile-secret
              mountPath: /keyfile-src
              readOnly: true
            - name: mongodb-keyfile
              mountPath: /keyfile
      containers:
        - name: mongodb
          image: mongo:7
          args:
            - --replSet
            - rs0
            - --bind_ip_all
            - --auth
            - --keyFile
            - /etc/mongodb-keyfile/keyfile
          envFrom:
            - secretRef:
                name: mongodb-secrets
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: mongodb-keyfile
              mountPath: /etc/mongodb-keyfile
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mongodb-keyfile-secret
          secret:
            secretName: mongodb-keyfile
        - name: mongodb-keyfile
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
        labels:
          app: mongodb
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
